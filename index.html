<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ULLSWATER | TOTAL MIRROR SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #1a2a3a; --border: #000; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Helvetica', sans-serif; background: #f0f2f5; padding: 20px 0; }
        
        .form-container { 
            width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 15mm; 
            border: 1px solid #000; position: relative;
        }

        .header { display: flex; justify-content: space-between; border-bottom: 4px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .corp-title { font-weight: 900; font-size: 28px; width: 100%; border: none; color: var(--primary); text-transform: uppercase; }
        
        #qrcode-container { border: 1px solid var(--border); padding: 5px; background: #fff; text-align: center; width: 200px; }
        .qr-label { font-size: 8px; font-weight: bold; margin-top: 4px; text-transform: uppercase; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 8px; font-size: 11px; }
        .bg-blue { background: var(--primary); color: white; font-weight: bold; text-transform: uppercase; }
        
        input, textarea { width: 100%; border: none; outline: none; font-family: inherit; font-size: 12px; background: transparent; }
        textarea { resize: none; overflow: hidden; display: block; }
        .grand-total-row { background: #f2f2f2; font-weight: bold; font-size: 14px; }

        .footer-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; margin-top: 30px; }
        .notes-box { border: 1px solid var(--border); padding: 10px; min-height: 120px; }
        .sig-line { border-top: 2px solid var(--border); margin-top: 60px; padding-top: 5px; text-align: center; font-weight: bold; }

        .controls { width: 210mm; margin: 20px auto; text-align: center; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; color: white; font-weight: bold; border-radius: 4px; font-size: 12px; }
        .btn-add { background: var(--primary); width: 100%; margin-top: 5px; }

        @media print { 
            .controls, .btn-add, .action-col { display: none !important; }
            body { background: white; padding: 0; }
            .form-container { border: none; box-shadow: none; margin: 0; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div style="flex-grow: 1;">
            <input type="text" id="corpName" class="corp-title" value="ULLSWATER CORPORATION" oninput="saveData()">
            <input type="text" id="corpSub" value="OFFICIAL INVOICE" style="letter-spacing: 4px; font-weight: bold;" oninput="saveData()">
            <div style="margin-top: 15px; font-weight: bold;">
                INV NO: <input type="text" id="invNo" style="width: 250px; border-bottom: 2px solid var(--primary); font-weight: bold;" placeholder="ULW-XXXX-XXX" oninput="saveData()">
            </div>
        </div>
        <div id="qrcode-container">
            <div id="qrcode"></div>
            <div class="qr-label">FULL DATA INTEGRITY MIRROR</div>
        </div>
    </div>

    <table>
        <tr>
            <td width="50%"><strong>DATE:</strong> <input type="date" id="invDate" oninput="saveData()"></td>
            <td width="50%"><strong>CLIENT TIN:</strong> <input type="text" id="clientTin" placeholder="000-000-000-000" oninput="saveData()"></td>
        </tr>
        <tr>
            <td colspan="2" style="min-height: 80px; vertical-align: top;">
                <strong>BILL TO:</strong>
                <textarea id="clientName" placeholder="Recipient Name & Address..." oninput="autoExpand(this); saveData()" style="font-weight: bold; margin-top: 8px;"></textarea>
            </td>
        </tr>
    </table>

    <table id="invTable">
        <thead>
            <tr class="bg-blue">
                <th width="12%">Source</th>
                <th>Description</th>
                <th width="8%">Qty</th>
                <th width="15%">Price</th>
                <th width="12%">Deduct</th>
                <th width="18%">Total</th>
                <th class="action-col" width="35px"></th>
            </tr>
        </thead>
        <tbody id="invBody"></tbody>
        <tfoot>
            <tr class="grand-total-row">
                <td colspan="5" style="text-align: right; padding-right: 15px;">GRAND TOTAL (PHP):</td>
                <td id="grandTotal" style="text-align: center; color: var(--primary);">0.00</td>
                <td class="action-col"></td>
            </tr>
        </tfoot>
    </table>
    
    <button class="btn-add no-print" onclick="addRow()">+ ADD SERVICE/ITEM LINE</button>

    <div class="footer-grid">
        <div class="notes-box">
            <div style="font-size: 10px; font-weight: bold; color: #555; margin-bottom: 5px;">NOTES / TERMS / REMITTANCE:</div>
            <textarea id="invNotes" placeholder="Payment terms or footnotes..." oninput="autoExpand(this); saveData()"></textarea>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: flex-end;">
            <div class="sig-line">
                <input type="text" id="signatoryName" value="AUTHORIZED SIGNATORY" style="text-align: center; font-weight: bold;" oninput="saveData()">
            </div>
        </div>
    </div>
</div>

<div class="controls no-print">
    <button style="background: #27ae60;" onclick="window.print()">PRINT PDF</button>
    <button style="background: #e67e22;" onclick="exportCSV()">EXPORT CSV MIRROR</button>
    <button style="background: #8e44ad;" onclick="saveJSON()">SAVE JSON</button>
    <button style="background: #2980b9;" onclick="document.getElementById('bulkInput').click()">LOAD BULK FILES</button>
    <button style="background: #c0392b;" onclick="clearForm()">RESET FORM</button>
    <input type="file" id="bulkInput" style="display:none" multiple onchange="loadBulk(event)">
</div>

<script>
    let qrTimeout;
    function autoExpand(el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; }

    function addRow(src="", d="", q=0, p=0, ded=0) {
        const tbody = document.getElementById('invBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="src" value="${src}" style="text-align:center; text-transform:uppercase;"></td>
            <td><textarea class="desc" oninput="autoExpand(this); saveData()">${d}</textarea></td>
            <td><input type="number" class="qty" value="${q}" oninput="calc(); saveData()" style="text-align:center;"></td>
            <td><input type="number" class="price" value="${p}" oninput="calc(); saveData()" style="text-align:center;"></td>
            <td><input type="number" class="deduct" value="${ded}" oninput="calc(); saveData()" style="text-align:center;"></td>
            <td class="row-total" style="font-weight:bold; text-align:center;">0.00</td>
            <td class="action-col" style="text-align:center;"><button style="background:#c0392b; color:white; border-radius:50%;" onclick="this.parentElement.parentElement.remove(); calc(); saveData()">✕</button></td>
        `;
        tbody.appendChild(tr);
        autoExpand(tr.querySelector('.desc'));
        calc();
    }

    function calc() {
        let grand = 0;
        document.querySelectorAll('#invBody tr').forEach(r => {
            let q = parseFloat(r.querySelector('.qty').value) || 0;
            let p = parseFloat(r.querySelector('.price').value) || 0;
            let d = parseFloat(r.querySelector('.deduct').value) || 0;
            let total = (q * p) - d;
            r.querySelector('.row-total').innerText = total.toFixed(2);
            grand += total;
        });
        document.getElementById('grandTotal').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
        updateQRCode();
    }

    function getFormData() {
        return {
            inv: document.getElementById('invNo').value,
            date: document.getElementById('invDate').value,
            tin: document.getElementById('clientTin').value,
            client: document.getElementById('clientName').value,
            notes: document.getElementById('invNotes').value,
            signatory: document.getElementById('signatoryName').value,
            total: document.getElementById('grandTotal').innerText,
            items: Array.from(document.querySelectorAll('#invBody tr')).map(r => {
                let i = r.querySelectorAll('input, textarea');
                return { 
                    src: i[0].value, 
                    d: i[1].value, // Mirrors full description
                    q: i[2].value, 
                    p: i[3].value, 
                    ded: i[4].value, 
                    total: r.querySelector('.row-total').innerText 
                };
            })
        };
    }

    // EXACT TEXT MIRRORING FOR QR
    function updateQRCode() {
        clearTimeout(qrTimeout);
        qrTimeout = setTimeout(() => {
            const d = getFormData();
            // Data is concatenated with distinct delimiters for parsing
            let mirror = `ULLSWATER|${d.inv}|${d.date}|TIN:${d.tin}\n`;
            mirror += `TO:${d.client.replace(/\n/g, ' ')}\n`;
            mirror += `ITEMS:\n` + d.items.map(i => `[${i.src}] ${i.d.substring(0,30)}:${i.q}x${i.p}(-${i.ded})=${i.total}`).join('\n');
            mirror += `\nNOTES:${d.notes.replace(/\n/g, ' ')}\nTOTAL:${d.total}\nSIG:${d.signatory}`;

            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = ""; 
            new QRCode(qrDiv, { text: mirror, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.L });
        }, 1000);
    }

    function exportCSV() {
        const d = getFormData();
        let csv = "INV_NO,DATE,CLIENT_TIN,CLIENT,ITEM_SRC,DESCRIPTION,QTY,PRICE,DEDUCT,LINE_TOTAL,GRAND_TOTAL,NOTES,SIGNATORY\n";
        d.items.forEach(i => {
            // Replaces newlines and quotes to maintain CSV structure
            const cleanClient = d.client.replace(/[\n\r]+/g, ' ').replace(/"/g, '""');
            const cleanDesc = i.d.replace(/[\n\r]+/g, ' ').replace(/"/g, '""');
            const cleanNotes = d.notes.replace(/[\n\r]+/g, ' ').replace(/"/g, '""');
            
            csv += `"${d.inv}","${d.date}","${d.tin}","${cleanClient}","${i.src}","${cleanDesc}","${i.q}","${i.p}","${i.ded}","${i.total}","${d.total}","${cleanNotes}","${d.signatory}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `MIRROR_${d.inv || 'DRAFT'}.csv`; a.click();
    }

    function saveJSON() {
        const d = getFormData();
        const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `INV_${d.inv || 'DRAFT'}.json`; a.click();
    }

    async function loadBulk(e) {
        for (const file of e.target.files) {
            const data = JSON.parse(await file.text());
            applyData(data);
        }
        alert("Bulk Load Completed.");
    }

    function applyData(data) {
        document.getElementById('invNo').value = data.inv || "";
        document.getElementById('invDate').value = data.date || "";
        document.getElementById('clientTin').value = data.tin || "";
        document.getElementById('clientName').value = data.client || "";
        document.getElementById('invNotes').value = data.notes || "";
        document.getElementById('signatoryName').value = data.signatory || "";
        document.getElementById('invBody').innerHTML = '';
        if (data.items) data.items.forEach(item => addRow(item.src, item.d, item.q, item.p, item.ded));
        calc();
    }

    function saveData() { localStorage.setItem('ULLSWATER_TOTAL_MIRROR', JSON.stringify(getFormData())); }
    function clearForm() { if(confirm("Clear form?")) { localStorage.removeItem('ULLSWATER_TOTAL_MIRROR'); location.reload(); } }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('ULLSWATER_TOTAL_MIRROR'));
        if(saved) applyData(saved); else { addRow(); document.getElementById('invDate').valueAsDate = new Date(); }
    };
</script>
</body>
</html>
